name: Check formatting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ruff-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ruff for formatting and linting
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"

      - name: Run formatting using ruff
        run: |
          ruff format --check .
